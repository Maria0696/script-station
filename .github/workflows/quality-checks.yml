name: Quality Checks

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: quality-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run RSpec
        run: bundle exec rspec

      - name: Debug coverage output
        if: always()
        run: |
          echo "::group::Workspace contents"
          pwd
          ls -la
          echo "::endgroup::"
          echo "::group::Coverage directory"
          if [ -d coverage ]; then
            echo "coverage/ EXISTS"
            ls -la coverage
            find coverage -type f | head -50
          else
            echo "coverage/ MISSING"
          fi
          echo "::endgroup::"
          if [ -d coverage ] && [ -n "$(find coverage -type f 2>/dev/null)" ]; then
            echo "RESULT=COVERAGE_PRESENT"
          else
            echo "RESULT=COVERAGE_ABSENT"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Clean Workspace
        if: always()
        uses: ./.github/actions/clean-workspace
